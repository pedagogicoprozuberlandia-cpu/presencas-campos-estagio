<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gerenciar Alunos – ILPI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; min-height: 100vh; }
    .topbar { background: #1a1a2e; color: white; padding: 16px 28px; display: flex; align-items: center; justify-content: space-between; }
    .topbar h1 { font-size: 1.1rem; font-weight: 600; }
    .container { max-width: 800px; margin: 0 auto; padding: 28px 20px; }
    .login-card { background: white; border-radius: 16px; padding: 36px 32px; max-width: 380px; margin: 60px auto; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    .login-card h2 { margin-bottom: 20px; color: #1a1a2e; }
    label { display: block; font-size: 0.85rem; font-weight: 600; color: #333; margin-bottom: 6px; }
    input { width: 100%; padding: 11px 14px; border: 1.5px solid #ddd; border-radius: 10px; font-size: 0.95rem; margin-bottom: 14px; background: white; }
    input:focus { outline: none; border-color: #1565c0; }
    .btn { padding: 11px 20px; background: #1565c0; color: white; border: none; border-radius: 10px; font-size: 0.9rem; font-weight: 600; cursor: pointer; }
    .btn:hover { background: #0d47a1; }
    .btn-full { width: 100%; }
    .btn-red { background: #c62828; } .btn-red:hover { background: #b71c1c; }
    .btn-green { background: #2e7d32; } .btn-green:hover { background: #1b5e20; }
    .card { background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.07); padding: 24px; margin-bottom: 20px; }
    .card h2 { font-size: 1rem; color: #1a1a2e; margin-bottom: 16px; }
    .form-row { display: flex; gap: 12px; flex-wrap: wrap; }
    .form-row .f { flex: 1; min-width: 130px; }
    .form-row input { margin-bottom: 0; }
    table { width: 100%; border-collapse: collapse; }
    th { background: #f5f7fa; text-align: left; padding: 10px 14px; font-size: 0.78rem; color: #666; font-weight: 600; text-transform: uppercase; }
    td { padding: 11px 14px; font-size: 0.88rem; color: #333; border-top: 1px solid #f0f0f0; }
    tr:hover td { background: #fafbfc; }
    .msg { padding: 10px 14px; border-radius: 8px; font-size: 0.88rem; margin-top: 12px; display: none; }
    .msg.success { background: #e8f5e9; color: #2e7d32; display: block; }
    .msg.error { background: #ffebee; color: #c62828; display: block; }
    .empty { text-align: center; padding: 30px; color: #aaa; }
    #painel { display: none; }
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; }
    .modal-overlay.active { display: flex; }
    .modal { background: white; border-radius: 14px; padding: 28px; max-width: 360px; width: 90%; text-align: center; }
    .modal h3 { margin-bottom: 10px; } .modal p { color: #555; font-size: 0.9rem; margin-bottom: 20px; }
    .modal-btns { display: flex; gap: 10px; }
    .modal-btns button { flex: 1; }
  </style>
</head>
<body>

<div id="login-admin">
  <div class="login-card">
    <h2>🔐 Gerenciar Alunos</h2>
    <label>Senha de acesso</label>
    <input type="password" id="senha-admin" placeholder="Digite a senha" />
    <button class="btn btn-full" onclick="loginAdmin()">Entrar</button>
    <div class="msg" id="msg-login"></div>
    <p style="margin-top:16px;font-size:0.8rem;color:#999;text-align:center">
      <a href="admin.html" style="color:#1565c0;text-decoration:none">← Voltar ao painel</a>
    </p>
  </div>
</div>

<div id="painel">
  <div class="topbar">
    <h1>👥 Gerenciar Alunos – PROZ ILPI</h1>
    <div style="display:flex;gap:10px">
      <a href="admin.html" style="color:#aaa;font-size:0.85rem;text-decoration:none;align-self:center">← Painel</a>
      <button class="btn btn-red" onclick="sairAdmin()" style="padding:8px 14px;font-size:0.82rem;">Sair</button>
    </div>
  </div>
  <div class="container">
    <div class="card">
      <h2>➕ Cadastrar Novo Aluno</h2>
      <div class="form-row">
        <div class="f"><label>Nome completo</label><input type="text" id="novo-nome" placeholder="Nome do aluno" /></div>
        <div class="f"><label>Matrícula</label><input type="text" id="novo-matricula" placeholder="Ex: 2024001" /></div>
        <div class="f"><label>CPF (só números)</label><input type="text" id="novo-cpf" placeholder="00000000000" inputmode="numeric" maxlength="11" /></div>
      </div>
      <button class="btn btn-green" onclick="cadastrar()" style="margin-top:14px">Cadastrar</button>
      <div class="msg" id="msg-cadastro"></div>
    </div>
    <div class="card">
      <h2>📋 Alunos Cadastrados</h2>
      <div id="tabela-alunos"><div class="empty">Carregando...</div></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-excluir">
  <div class="modal">
    <h3>⚠️ Excluir Aluno</h3>
    <p id="modal-texto"></p>
    <div class="modal-btns">
      <button class="btn" style="background:white;color:#1565c0;border:1.5px solid #1565c0;" onclick="fecharModal()">Cancelar</button>
      <button class="btn btn-red" onclick="confirmarExclusao()">Excluir</button>
    </div>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://popryznbbmzbzaowfeoc.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBvcHJ5em5iYm16Ynphb3dmZW9jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0MDI3NDcsImV4cCI6MjA5Nzk3ODc0N30.xkPhLr-76Vtdo5yTC4hJRg52aM4-8bwQyGBqtzouJKE';
  const SENHA_ADMIN = 'proz2025';
  let alunoParaExcluir = null;

  function loginAdmin() {
    if (document.getElementById('senha-admin').value === SENHA_ADMIN) {
      document.getElementById('login-admin').style.display = 'none';
      document.getElementById('painel').style.display = 'block';
      carregarAlunos();
    } else {
      const msg = document.getElementById('msg-login');
      msg.className = 'msg error'; msg.textContent = 'Senha incorreta.';
    }
  }
  document.getElementById('senha-admin').addEventListener('keydown', e => { if(e.key==='Enter') loginAdmin(); });
  function sairAdmin() { document.getElementById('login-admin').style.display='block'; document.getElementById('painel').style.display='none'; document.getElementById('senha-admin').value=''; }

  async function supabaseFetch(path, options = {}) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1${path}`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=representation', ...options.headers },
      ...options
    });
    if (options.method === 'DELETE') return res.ok;
    const data = await res.json();
    if (!res.ok) throw new Error(data.message || JSON.stringify(data));
    return data;
  }

  async function carregarAlunos() {
    const cont = document.getElementById('tabela-alunos');
    try {
      const data = await supabaseFetch('/alunos_ilpi?order=nome.asc');
      if (!data.length) { cont.innerHTML = '<div class="empty">Nenhum aluno cadastrado.</div>'; return; }
      const rows = data.map(a => `<tr>
        <td><strong>${a.nome}</strong></td>
        <td>${a.matricula}</td>
        <td>${a.cpf ? a.cpf.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/,'$1.$2.$3-$4') : '-'}</td>
        <td><button class="btn btn-red" onclick="abrirModal('${a.id}','${a.nome.replace(/'/g,"\\'")}' )" style="padding:6px 14px;font-size:0.8rem;">🗑 Excluir</button></td>
      </tr>`).join('');
      cont.innerHTML = `<table><thead><tr><th>Nome</th><th>Matrícula</th><th>CPF</th><th>Ação</th></tr></thead><tbody>${rows}</tbody></table>`;
    } catch(e) { cont.innerHTML = '<div class="empty">Erro ao carregar.</div>'; }
  }

  async function cadastrar() {
    const nome = document.getElementById('novo-nome').value.trim();
    const matricula = document.getElementById('novo-matricula').value.trim();
    const cpf = document.getElementById('novo-cpf').value.trim().replace(/\D/g,'');
    const msg = document.getElementById('msg-cadastro');
    if (!nome || !matricula || !cpf) { msg.className='msg error'; msg.textContent='Preencha todos os campos.'; return; }
    if (cpf.length !== 11) { msg.className='msg error'; msg.textContent='CPF deve ter 11 dígitos.'; return; }
    try {
      await supabaseFetch('/alunos_ilpi', { method:'POST', body: JSON.stringify({nome, matricula, cpf}) });
      msg.className='msg success'; msg.textContent=`${nome} cadastrado com sucesso!`;
      document.getElementById('novo-nome').value='';
      document.getElementById('novo-matricula').value='';
      document.getElementById('novo-cpf').value='';
      carregarAlunos();
    } catch(e) {
      msg.className='msg error';
      msg.textContent = e.message.includes('unique') ? 'CPF ou matrícula já cadastrado.' : 'Erro ao cadastrar.';
    }
  }

  function abrirModal(id, nome) {
    alunoParaExcluir = id;
    document.getElementById('modal-texto').textContent = `Tem certeza que deseja excluir "${nome}"? Os registros de presença serão mantidos.`;
    document.getElementById('modal-excluir').classList.add('active');
  }
  function fecharModal() { alunoParaExcluir=null; document.getElementById('modal-excluir').classList.remove('active'); }
  async function confirmarExclusao() {
    if (!alunoParaExcluir) return;
    try { await supabaseFetch(`/alunos_ilpi?id=eq.${alunoParaExcluir}`, {method:'DELETE'}); fecharModal(); carregarAlunos(); }
    catch(e) { fecharModal(); alert('Erro ao excluir.'); }
  }
  document.getElementById('modal-excluir').addEventListener('click', function(e) { if(e.target===this) fecharModal(); });
</script>
</body>
</html>
